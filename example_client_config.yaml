github:
  tokens:
    # contents (recommended): GitHub Contents REST API. One PUT per batch,
    # ~250 ms round-trip — fastest of the three. Counts against the 5000/hr
    # primary REST quota (we use ~2400/hr at 1500 ms cadence).
    - token: "ghp_your_token_here"
      transport: "contents"
      repo: "yourname/your-private-tunnel-repo"
      batch_interval: 800ms
      fetch_interval: 800ms

    # git: no REST quota, but each push runs the pack-file pipeline.
    # - token: "ghp_your_token_here"
    #   transport: "git"
    #   repo: "yourname/your-private-tunnel-repo"
    #   batch_interval: 1500ms
    #   fetch_interval: 1500ms

    # gist: 500 writes/hr/account secondary cap.
    # - token: "ghp_your_token_here"
    #   transport: "gist"
    #   batch_interval: 1500ms
    #   fetch_interval: 1500ms

  # One channel per token. Virtual connections multiplex onto it.
  upstream_connections: 1

  # Global defaults — used when a token doesn't override.
  batch_interval: 800ms
  fetch_interval: 800ms
  api_timeout: 10s

socks:
  listen_addr: "127.0.0.1:1080"
  timeout: 30s
  # Max bytes per Read from the SOCKS app → one outbound chunk.
  # Bump (1-2 MiB) for high-throughput uploads.
  buffer_size: 1048576

encryption:
  algorithm: "xor"

rate_limit:
  max_requests_per_hour: 4500
  burst_limit: 25
  backoff_multiplier: 2.0
  low_remaining_warn: 30

logging:
  level: "info"
  format: "text"
  file: ""
