github:
  tokens:
    # contents (recommended): one PUT per batch, ~250 ms RTT.
    - token: "ghp_your_server_token_here"
      transport: "contents"
      repo: "yourname/your-private-tunnel-repo"
      batch_interval: 800ms
      fetch_interval: 800ms

    # git Smart HTTP — slower than contents, no REST quota.
    # - token: "ghp_your_server_token_here"
    #   transport: "git"
    #   repo: "yourname/your-private-tunnel-repo"
    #   batch_interval: 1500ms
    #   fetch_interval: 1500ms

    # gist — 500 writes/hr/account secondary cap.
    # - token: "ghp_your_server_token_here"
    #   transport: "gist"
    #   batch_interval: 1500ms
    #   fetch_interval: 1500ms

  upstream_connections: 1
  batch_interval: 800ms
  fetch_interval: 800ms
  api_timeout: 10s

cleanup:
  enabled: true
  interval: 10m
  dead_connection_ttl: 15m

proxy:
  target_timeout: 30s
  # Max bytes per Read from the upstream destination → one frame.
  # Bump (1-2 MiB) for video / large downloads.
  buffer_size: 2097152

encryption:
  algorithm: "xor"

logging:
  level: "info"
  format: "text"
  file: "/var/log/gh-tunnel/server.log"
